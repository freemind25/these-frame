name: Build Windows .exe (Tauri v2)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag de release (ex: v0.2.1). Laisser vide pour un simple artifact.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Bun
        run: npm install -g bun

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Switch Prisma to SQLite (desktop)
        shell: pwsh
        run: |
          $schema = Get-Content 'prisma/schema.prisma' -Raw
          $schema = $schema -replace 'provider = "postgresql"', 'provider = "sqlite"'
          Set-Content 'prisma/schema.prisma' $schema
          Write-Host 'Prisma provider switched to sqlite'

      - name: Create SQLite DB directory
        run: New-Item -ItemType Directory -Force -Path 'db'

      - name: Build Tauri app (NSIS .exe installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: 'file:./db/custom.db'
          NODE_ENV: production

      - name: Upload NSIS installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: ThesisFrame-Setup
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          echo "## ThesisFrame Build Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "- **OS**: Windows (latest)" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Tauri**: v2 (NSIS installer)" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Database**: SQLite (local)" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Date**: $([System.DateTime]::UtcNow.ToString('yyyy-MM-dd HH:mm')) UTC" >> $env:GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
